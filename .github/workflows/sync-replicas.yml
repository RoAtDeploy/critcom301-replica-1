name: Sync Replicas

on:
  push:
    branches:
      - '**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
       - name: Push to replica-1
        env:
          GH_USERNAME: RoAtDeploy
          GH_TOKEN: ${{ secrets.SYNC_REPLICA_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add replica-1 "https://${GH_USERNAME}:${GH_TOKEN}@github.com/RoAtDeploy/critcom301-replica-1.git"

          git remote -v
          git push --mirror replica-1
